version: "3.9"

# ─── Lab Interpreter — Docker Compose para Produção na VPS Hostinger ─────────
#
# IMPORTANTE: O Traefik desta VPS usa rede "host" (não bridge nomeada).
# A integração é feita APENAS via labels Docker — não é necessário
# criar ou conectar a nenhuma rede "traefik-net".
#
# Uso:
#   docker compose -f docker-compose.yml --env-file .env up -d --build
#   docker compose -f docker-compose.yml --env-file .env logs -f lab-app
#   docker compose -f docker-compose.yml --env-file .env down
#
# Após subir, conectar ao Ollama já existente na VPS:
#   docker network connect ollama-hd0v_default lab-interpreter-app

networks:
  # Rede interna isolada para comunicação entre os contêineres do lab-interpreter
  lab-net:
    name: lab-interpreter_lab-net
    driver: bridge

services:
  # ─── Banco de Dados MySQL (dedicado, isolado) ──────────────────────────────
  lab-db:
    image: mysql:8.0
    container_name: lab-interpreter-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lab_interpreter}
      MYSQL_USER: ${MYSQL_USER:-labuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - lab-db-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lab-net
    # Porta NÃO exposta para o host — acesso apenas interno
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MinIO Storage (dedicado ao lab-interpreter) ───────────────────────────
  lab-minio:
    image: minio/minio:latest
    container_name: lab-interpreter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-labadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - lab-minio-data:/data
    networks:
      - lab-net
    # Para acesso temporário ao console MinIO durante setup, descomente:
    # ports:
    #   - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Aplicação Node.js ─────────────────────────────────────────────────────
  lab-app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: lab-interpreter:latest
    container_name: lab-interpreter-app
    restart: unless-stopped
    depends_on:
      lab-db:
        condition: service_healthy
      lab-minio:
        condition: service_healthy
    # Porta NÃO exposta para o host em produção — Traefik roteia via labels
    # Para debug temporário, descomente a linha abaixo:
    # ports:
    #   - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Banco de dados
      DATABASE_URL: mysql://${MYSQL_USER:-labuser}:${MYSQL_PASSWORD}@lab-db:3306/${MYSQL_DATABASE:-lab_interpreter}
      # Segurança
      JWT_SECRET: ${JWT_SECRET}
      # Storage MinIO local (substitui Manus S3)
      STORAGE_MODE: s3
      S3_ENDPOINT: http://lab-minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-labadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_BUCKET:-lab-interpreter-files}
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      # Ollama — conectado via: docker network connect ollama-hd0v_default lab-interpreter-app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama-hd0v-ollama-1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - lab-uploads:/app/uploads
    networks:
      - lab-net
    labels:
      # ─── Traefik Labels ────────────────────────────────────────────────────
      # O Traefik desta VPS usa rede "host" e detecta contêineres via socket Docker.
      # Ele acessa este contêiner pelo IP da rede lab-net automaticamente.
      - "traefik.enable=true"
      # Indica qual rede usar para alcançar este contêiner
      - "traefik.docker.network=lab-interpreter_lab-net"
      # Router HTTP → redireciona para HTTPS
      - "traefik.http.routers.lab-http.rule=Host(`${DOMAIN:-labinterpreter.drzacher.com}`)"
      - "traefik.http.routers.lab-http.entrypoints=web"
      - "traefik.http.routers.lab-http.middlewares=lab-https-redirect"
      - "traefik.http.middlewares.lab-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.lab-https-redirect.redirectscheme.permanent=true"
      # Router HTTPS com certificado automático Let's Encrypt
      - "traefik.http.routers.lab-https.rule=Host(`${DOMAIN:-labinterpreter.drzacher.com}`)"
      - "traefik.http.routers.lab-https.entrypoints=websecure"
      - "traefik.http.routers.lab-https.tls=true"
      - "traefik.http.routers.lab-https.tls.certresolver=letsencrypt"
      # Porta interna do contêiner
      - "traefik.http.services.lab-app.loadbalancer.server.port=3000"

volumes:
  lab-db-data:
    driver: local
  lab-minio-data:
    driver: local
  lab-uploads:
    driver: local
